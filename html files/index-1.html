<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AWS Cloud Services</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
            font-family: Segoe UI, sans-serif;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #232f3e, #ff9900);
            color: white;
        }

        .card {
            border: none;
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="container text-center">
            <h1 class="display-3 fw-bold">AWS Cloud Services</h1>
            <p class="lead">Scalable Infrastructure Powered by AWS</p>
        </div>
    </section>

    <div class="container py-5">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="card shadow p-4">
                    <h4>EC2</h4>
                    <p>Secure virtual servers with auto scaling support.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow p-4">
                    <h4>S3</h4>
                    <p>Highly durable object storage for any workload.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow p-4">
                    <h4>RDS</h4>
                    <p>Managed relational database services.</p>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
