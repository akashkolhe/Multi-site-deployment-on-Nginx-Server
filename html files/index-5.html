<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Serverless Solutions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .hero {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            padding: 180px 0;
        }

        .card-custom {
            padding: 30px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
            transition: .3s;
        }

        .card-custom:hover {
            transform: translateY(-10px);
        }
    </style>

</head>

<body>

    <section class="hero text-center">

        <div class="container">

            <h1 class="display-2">AWS Serverless</h1>

            <p class="lead">
                Build applications without managing servers
            </p>

        </div>

    </section>

    <div class="container py-5">

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card-custom">
                    <h4>Lambda</h4>
                    <p>Event driven compute service.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-custom">
                    <h4>API Gateway</h4>
                    <p>Create scalable APIs.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-custom">
                    <h4>DynamoDB</h4>
                    <p>Serverless NoSQL database.</p>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
