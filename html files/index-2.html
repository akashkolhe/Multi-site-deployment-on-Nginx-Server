<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevOps Automation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            background: #0f172a;
            color: white;
        }

        .tool {
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, .1);
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="container text-center">
            <h1 class="display-2">DevOps Automation</h1>
            <p>CI/CD • Infrastructure as Code • Automation</p>
        </div>
    </section>

    <div class="container py-5">

        <div class="row g-4">

            <div class="col-md-3">
                <div class="tool">
                    <h4>Jenkins</h4>
                    <p>Automated CI/CD pipelines.</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="tool">
                    <h4>GitHub</h4>
                    <p>Version control and collaboration.</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="tool">
                    <h4>Terraform</h4>
                    <p>Infrastructure as Code.</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="tool">
                    <h4>Ansible</h4>
                    <p>Configuration management.</p>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
