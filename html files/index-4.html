<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Monitoring Stack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #111827, #10b981);
            color: white;
        }

        .box {
            padding: 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
        }
    </style>

</head>

<body>

    <section class="hero">
        <div class="container text-center">
            <h1 class="display-3">Monitoring & Observability</h1>
            <p>Track everything in real time.</p>
        </div>
    </section>

    <div class="container py-5">

        <div class="row g-4">

            <div class="col-md-4">
                <div class="box">
                    <h4>Prometheus</h4>
                    <p>Metrics collection platform.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="box">
                    <h4>Grafana</h4>
                    <p>Visualization dashboards.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="box">
                    <h4>CloudWatch</h4>
                    <p>AWS monitoring service.</p>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
